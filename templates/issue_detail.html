<!DOCTYPE html>
<html>
<head>
    <title>Issue Detail - CivicConnect</title>
   <link rel="stylesheet" href="../static/css/style.css">

</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h1>{{ issue.title }}</h1>
            <p><strong>Locality:</strong> {{ issue.locality.title() }}</p>
            <p><strong>Category:</strong> {{ issue.category }}</p>
            <p><strong>Status:</strong> <span class="status status-{{ issue.status }}">{{ issue.status }}</span></p>
            <p><strong>Description:</strong> {{ issue.description }}</p>
            <p><strong>Reported:</strong> {{ issue.created_at.strftime('%d %b %Y') }}</p>
            
            {% if current_user.is_admin %}
            <form method="POST" action="{{ url_for('update_status', id=issue.id) }}">
                <select name="status">
                    <option value="Reported" {% if issue.status == 'Reported' %}selected{% endif %}>Reported</option>
                    <option value="Verified" {% if issue.status == 'Verified' %}selected{% endif %}>Verified</option>
                    <option value="In Progress" {% if issue.status == 'In Progress' %}selected{% endif %}>In Progress</option>
                    <option value="Resolved" {% if issue.status == 'Resolved' %}selected{% endif %}>Resolved</option>
                </select>
                <button type="submit" class="btn">Update Status</button>
            </form>
            {% endif %}
        </div>
    </div>
</body>
</html>
