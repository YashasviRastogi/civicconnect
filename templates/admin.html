<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - CivicConnect</title>
    <link rel="stylesheet" href="../static/css/style.css">

</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h1>Admin Panel</h1>
        
        <div class="card">
            <h2>All Issues ({{ issues|length }})</h2>
            <table class="shame-table">
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Locality</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                {% for issue in issues %}
                <tr>
                    <td>{{ issue.id }}</td>
                    <td>{{ issue.title[:50] }}...</td>
                    <td>{{ issue.locality.title() }}</td>
                    <td><span class="status status-{{ issue.status }}">{{ issue.status }}</span></td>
                    <td>
                        <form method="POST" action="{{ url_for('update_status', id=issue.id) }}" style="display:inline;">
                            <select name="status">
                                <option value="Reported" {% if issue.status == 'Reported' %}selected{% endif %}>Reported</option>
                                <option value="Verified" {% if issue.status == 'Verified' %}selected{% endif %}>Verified</option>
                                <option value="In Progress" {% if issue.status == 'In Progress' %}selected{% endif %}>In Progress</option>
                                <option value="Resolved" {% if issue.status == 'Resolved' %}selected{% endif %}>Resolved</option>
                            </select>
                            <button type="submit" class="btn">Update</button>
                        </form>
                    </td>
                </tr>
                {% endfor %} 
            </table>
        </div>
    </div>
</body>
</html>
