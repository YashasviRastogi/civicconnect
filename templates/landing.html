<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CivicConnect – Landing Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      font-family: 'Poppins', sans-serif;
      background-color: #f5f5f5;
      color: #333;
      overflow: hidden;
    }
    .landing-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    }
    #bgCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }
    .logo-wrapper {
      z-index: 2;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .animated-logo {
      width: 80px;
      height: 80px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    h1 {
      z-index: 2;
      color: white;
      font-size: 2.5rem;
      margin-bottom: 12px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .subtitle {
      z-index: 2;
      color: #e0f7fa;
      font-size: 1.1rem;
      margin-bottom: 32px;
    }
    .btn-group {
      z-index: 2;
      display: flex;
      gap: 16px;
    }
    .btn-login {
      background: #D4A574;
      color: white;
      padding: 12px 32px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 0.2s, background 0.2s;
    }
    .btn-login:hover {
      background: #C49060;
      transform: translateY(-2px);
    }
    .btn-register {
      background: white;
      color: #D4A574;
      padding: 12px 32px;
      border-radius: 30px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      border: 2px solid #D4A574;
      transition: transform 0.2s, background 0.2s;
    }
    .btn-register:hover {
      background: #fff8f2;
      transform: translateY(-2px);
    }
    footer {
      position: absolute;
      bottom: 20px;
      z-index: 2;
      color: #aaa;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="landing-container">
    <canvas id="bgCanvas"></canvas>
    <div class="logo-wrapper">
      <img src="{{ url_for('static', filename='cc-logo.png') }}" alt="CivicConnect Logo" class="animated-logo" />
    </div>
    <h1>Welcome to CivicConnect</h1>
    <p class="subtitle">Ghaziabad Edition — Empowering citizens, holding localities accountable.</p>
    <div class="btn-group">
      <a href="{{ url_for('login') }}" class="btn-login">Login</a>
      <a href="{{ url_for('register') }}" class="btn-register">Register</a>
    </div>
    <footer>© 2026 CivicConnect. Built for Ghaziabad.</footer>
  </div>

  <script>
    const canvas = document.getElementById("bgCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let mouse = { x: null, y: null };
    window.addEventListener("mousemove", e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    let particles = [];
    for (let i = 0; i < 120; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2 + 1,
        dx: (Math.random() - 0.5) * 0.5,
        dy: (Math.random() - 0.5) * 0.5
      });
    }

    function drawParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#00bcd4";
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        p.x += p.dx;
        p.y += p.dy;
        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
        if (mouse.x && mouse.y) {
          const dist = Math.hypot(p.x - mouse.x, p.y - mouse.y);
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.strokeStyle = `rgba(255,255,255,${1 - dist / 120})`;
            ctx.lineWidth = 1.2;
            ctx.stroke();
          }
        }
      });
      requestAnimationFrame(drawParticles);
    }
    drawParticles();
  </script>
</body>
</html>
